version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - DATABASE_URL=postgresql://adata:adata@db:5432/adata_studio
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - db
    networks:
      - adata-network

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: adata
      POSTGRES_PASSWORD: adata
      POSTGRES_DB: adata_studio
    ports:
      - "5432:5432"
    networks:
      - adata-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adata -d adata_studio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  adata-network:
    driver: bridge
